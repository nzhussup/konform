name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}
          persist-credentials: false

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit changelog back to main
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git checkout main
          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changelog changes"
          else
            git commit -m "docs: update changelog for ${{ github.ref_name }} [skip ci]"
            git push "https://x-access-token:${{ secrets.RELEASE_PUSH_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
          fi

      - name: Build release notes from CHANGELOG section
        id: release_notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          awk -v tag="$TAG" '
            BEGIN { in_section=0; found=0 }
            $0 ~ "^## " tag " - " { in_section=1; found=1; next }
            in_section && $0 ~ "^## " { exit }
            in_section { print }
            END {
              if (!found) {
                exit 2
              }
            }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/N;/^\n$/D' > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No release notes found for $TAG in CHANGELOG.md"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
